[phases.setup]
nixPkgs = ["php83Extensions.exif", "php83Extensions.gd", "php83Extensions.pdo_pgsql"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-dev --no-interaction --ignore-platform-req=ext-exif"]

[phases.build]
cmds = ["npm install && npm run build && php artisan config:cache"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
